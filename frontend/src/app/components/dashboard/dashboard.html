<div class="dashboard-container">
  <div class="dashboard-header">
    <h1>my zine collection 📚</h1>
    <button class="btn-create" routerLink="/editor/new">+ Create New</button>
  </div>

  <div *ngIf="loading" class="loading-state">
    <div class="loading-spinner"></div>
    <p>finding your zines...</p>
  </div>

  <div *ngIf="!loading && zines.length === 0" class="empty-state">
    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Empty" alt="Empty state illustration">
    <h2>no zines yet!</h2>
    <p>your library is looking a bit lonely. click '+' to start your first one!</p>
    <button class="btn-secondary" routerLink="/editor/new">Make a Zine</button>
  </div>

  <div *ngIf="!loading && zines.length > 0" class="zine-grid">
    <div class="zine-card" *ngFor="let zine of zines">
      <div class="zine-cover" [routerLink]="['/editor', zine.slug]">
        <img [src]="zine.page_cover || 'https://placehold.co/200x300?text=No+Cover'" alt="Zine cover">
        <div class="zine-overlay">
          <span>Edit Zine</span>
        </div>
      </div>
      
      <div class="zine-info">
        <h3>{{ zine.title }}</h3>
        <div class="privacy-control">
          <span>{{ zine.is_public ? 'Public' : 'Private' }}</span>
          <label class="switch">
            <input type="checkbox" [checked]="zine.is_public" (change)="togglePrivacy(zine)">
            <span class="slider round"></span>
          </label>
        </div>
      </div>
    </div>
  </div>
</div>
